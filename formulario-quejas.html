<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Reportes & Quejas — ARtiGA</title>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;700&family=Inter:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --red:    #FF1801;
      --dark:   #0a0a0a;
      --panel:  #111111;
      --border: #222222;
      --text:   #e8e8e8;
      --muted:  #666666;
    }

    body {
      background: var(--dark);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }

    /* Checkered flag background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        repeating-conic-gradient(#ffffff08 0% 25%, transparent 0% 50%);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    .card {
      position: relative;
      z-index: 1;
      background: var(--panel);
      border: 1px solid var(--border);
      border-top: 3px solid var(--red);
      border-radius: 2px;
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 480px;
      box-shadow: 0 0 60px #FF180118;
    }

    .header {
      margin-bottom: 2rem;
      border-bottom: 1px solid var(--border);
      padding-bottom: 1.5rem;
    }

    .tag {
      font-family: 'Rajdhani', sans-serif;
      font-size: 0.7rem;
      letter-spacing: 0.2em;
      color: var(--red);
      text-transform: uppercase;
      margin-bottom: 0.5rem;
    }

    h1 {
      font-family: 'Rajdhani', sans-serif;
      font-size: 1.9rem;
      font-weight: 700;
      letter-spacing: 0.03em;
      line-height: 1.1;
    }

    h1 span { color: var(--red); }

    .subtitle {
      margin-top: 0.5rem;
      font-size: 0.82rem;
      color: var(--muted);
    }

    .form-group {
      margin-bottom: 1.25rem;
    }

    label {
      display: block;
      font-size: 0.75rem;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.4rem;
    }

    input, select, textarea {
      width: 100%;
      background: #0d0d0d;
      border: 1px solid var(--border);
      border-radius: 2px;
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 0.9rem;
      padding: 0.65rem 0.85rem;
      transition: border-color 0.2s;
      outline: none;
      appearance: none;
    }

    input:focus, select:focus, textarea:focus {
      border-color: var(--red);
    }

    textarea { resize: vertical; min-height: 110px; }

    select option { background: #111; }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
    }

    /* Honeypot oculto anti-spam */
    .hp { display: none; }

    button[type="submit"] {
      width: 100%;
      margin-top: 0.5rem;
      background: var(--red);
      color: #fff;
      border: none;
      border-radius: 2px;
      font-family: 'Rajdhani', sans-serif;
      font-size: 1.05rem;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      padding: 0.85rem;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
    }

    button[type="submit"]:hover  { opacity: 0.85; }
    button[type="submit"]:active { transform: scale(0.98); }

    .footer-note {
      margin-top: 1rem;
      text-align: center;
      font-size: 0.74rem;
      color: var(--muted);
    }

    .footer-note a { color: var(--red); text-decoration: none; }

    /* Mensaje de éxito */
    #success-msg {
      display: none;
      text-align: center;
      padding: 1.5rem 0 0.5rem;
    }

    #success-msg .check {
      font-size: 2.5rem;
      margin-bottom: 0.75rem;
    }

    #success-msg h2 {
      font-family: 'Rajdhani', sans-serif;
      font-size: 1.4rem;
      color: var(--red);
      margin-bottom: 0.4rem;
    }

    #success-msg p { font-size: 0.85rem; color: var(--muted); }
  </style>
</head>
<body>

<div class="card">

  <div class="header">
    <div class="tag">🏎️ ARtiGA · Control de Pista</div>
    <h1>ZONA DE<br><span>REPORTES</span></h1>
    <p class="subtitle">Tu mensaje llega directamente a <strong>20151915@clases.edu.sv</strong></p>
  </div>

  <!-- Formulario — reemplaza XXXXXXXX con tu ID de Formspree -->
  <form
    id="complaint-form"
    action="https://formspree.io/f/mbdeogbb"
    method="POST"
  >
    <!-- Campo oculto: redirige la respuesta de Formspree -->
    <input type="hidden" name="_subject" value="🚨 Nuevo reporte desde ARtiGA GitHub" />
    <input type="hidden" name="_next" value="" />

    <!-- Honeypot anti-spam -->
    <div class="hp">
      <input type="text" name="_gotcha" tabindex="-1" autocomplete="off" />
    </div>

    <div class="row">
      <div class="form-group">
        <label for="nombre">Nombre</label>
        <input type="text" id="nombre" name="nombre" placeholder="Tu nombre" required />
      </div>
      <div class="form-group">
        <label for="email">Correo</label>
        <input type="email" id="email" name="email" placeholder="tu@correo.com" required />
      </div>
    </div>

    <div class="form-group">
      <label for="tipo">Tipo de reporte</label>
      <select id="tipo" name="tipo" required>
        <option value="" disabled selected>Selecciona una categoría</option>
        <option value="Bug en código">🐛 Bug en código</option>
        <option value="Error en documentación">📄 Error en documentación</option>
        <option value="Sugerencia de mejora">💡 Sugerencia de mejora</option>
        <option value="Queja general">⚠️ Queja general</option>
        <option value="Otro">🔧 Otro</option>
      </select>
    </div>

    <div class="form-group">
      <label for="mensaje">Descripción del problema</label>
      <textarea id="mensaje" name="mensaje" placeholder="Describe el problema o sugerencia con el mayor detalle posible..." required></textarea>
    </div>

    <button type="submit">ENVIAR REPORTE ›</button>

    <p class="footer-note">
      Powered by <a href="https://formspree.io" target="_blank">Formspree</a> · Respuesta en 24–48h
    </p>
  </form>

  <div id="success-msg">
    <div class="check">✅</div>
    <h2>¡REPORTE ENVIADO!</h2>
    <p>Tu mensaje llegó a Jefferson. Te responderá a la brevedad.</p>
  </div>

</div>

<script>
  const form = document.getElementById('complaint-form');
  const successMsg = document.getElementById('success-msg');

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    const data = new FormData(form);

    try {
      const res = await fetch(form.action, {
        method: 'POST',
        body: data,
        headers: { 'Accept': 'application/json' }
      });

      if (res.ok) {
        form.style.display = 'none';
        successMsg.style.display = 'block';
      } else {
        alert('Hubo un error al enviar. Intenta de nuevo o escribe directamente a 20151915@clases.edu.sv');
      }
    } catch {
      alert('Error de conexión. Verifica tu internet e intenta de nuevo.');
    }
  });
</script>

</body>
</html>
