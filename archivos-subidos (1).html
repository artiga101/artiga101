<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Archivos Subidos — ARtiGA</title>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --red:     #FF1801;
      --dark:    #0a0a0a;
      --panel:   #0f0f0f;
      --card:    #141414;
      --border:  #1e1e1e;
      --border2: #2a2a2a;
      --text:    #e8e8e8;
      --muted:   #555;
      --green:   #00d46a;
    }

    body {
      background: var(--dark);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      padding: 0;
    }

    /* Checkered header stripe */
    .header-stripe {
      height: 6px;
      background-image: repeating-conic-gradient(#fff 0% 25%, #000 0% 50%);
      background-size: 12px 6px;
    }

    /* Hero */
    .hero {
      background: var(--panel);
      border-bottom: 1px solid var(--border);
      padding: 2.5rem 2rem 2rem;
      position: relative;
      overflow: hidden;
    }

    .hero::before {
      content: 'DRIVE';
      position: absolute;
      right: -10px;
      top: 50%;
      transform: translateY(-50%);
      font-family: 'Rajdhani', sans-serif;
      font-size: 9rem;
      font-weight: 700;
      color: #ffffff04;
      pointer-events: none;
      letter-spacing: -4px;
    }

    .hero-tag {
      font-family: 'Rajdhani', sans-serif;
      font-size: 0.7rem;
      letter-spacing: 0.25em;
      color: var(--red);
      text-transform: uppercase;
      margin-bottom: 0.4rem;
    }

    .hero h1 {
      font-family: 'Rajdhani', sans-serif;
      font-size: clamp(1.8rem, 5vw, 3rem);
      font-weight: 700;
      letter-spacing: 0.02em;
      line-height: 1;
    }

    .hero h1 span { color: var(--red); }

    .hero-sub {
      margin-top: 0.5rem;
      font-size: 0.82rem;
      color: var(--muted);
    }

    /* Stat bar */
    .stat-bar {
      display: flex;
      gap: 0;
      border-bottom: 1px solid var(--border);
      background: var(--panel);
    }

    .stat {
      flex: 1;
      padding: 0.75rem 1.25rem;
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .stat:last-child { border-right: none; }

    .stat-label {
      font-size: 0.65rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .stat-value {
      font-family: 'Rajdhani', sans-serif;
      font-size: 1.3rem;
      font-weight: 600;
      color: var(--text);
    }

    .stat-value.red { color: var(--red); }
    .stat-value.green { color: var(--green); }

    /* Main */
    main { padding: 1.5rem 1.25rem; max-width: 900px; margin: 0 auto; }

    /* Filter bar */
    .filter-bar {
      display: flex;
      gap: 8px;
      margin-bottom: 1.25rem;
      flex-wrap: wrap;
      align-items: center;
    }

    .filter-btn {
      font-family: 'Rajdhani', sans-serif;
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 5px 14px;
      border: 1px solid var(--border2);
      border-radius: 2px;
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.15s;
    }

    .filter-btn:hover, .filter-btn.active {
      border-color: var(--red);
      color: var(--red);
    }

    .search-box {
      margin-left: auto;
      background: var(--card);
      border: 1px solid var(--border2);
      border-radius: 2px;
      padding: 5px 12px;
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 0.82rem;
      outline: none;
      width: 180px;
      transition: border-color 0.15s;
    }

    .search-box:focus { border-color: var(--red); }
    .search-box::placeholder { color: var(--muted); }

    /* Grid */
    .files-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 10px;
    }

    /* File card */
    .file-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 2px;
      padding: 1rem;
      display: flex;
      flex-direction: column;
      gap: 10px;
      cursor: pointer;
      text-decoration: none;
      color: inherit;
      transition: border-color 0.15s, background 0.15s;
      position: relative;
      overflow: hidden;
    }

    .file-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0;
      width: 3px; height: 100%;
      background: var(--border2);
      transition: background 0.15s;
    }

    .file-card:hover { border-color: var(--border2); background: #161616; }
    .file-card:hover::before { background: var(--red); }

    .file-icon {
      font-size: 1.6rem;
      line-height: 1;
    }

    .file-name {
      font-size: 0.82rem;
      font-weight: 500;
      color: var(--text);
      word-break: break-word;
      line-height: 1.4;
    }

    .file-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: auto;
    }

    .file-ext {
      font-family: 'Rajdhani', sans-serif;
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 2px 7px;
      border-radius: 2px;
    }

    .file-size {
      font-size: 0.72rem;
      color: var(--muted);
    }

    .ext-pdf   { background: #3a1212; color: #ff6b6b; }
    .ext-docx, .ext-doc { background: #12213a; color: #6bb5ff; }
    .ext-pptx, .ext-ppt { background: #3a2212; color: #ffaa6b; }
    .ext-xlsx, .ext-xls { background: #12301a; color: #6bffaa; }
    .ext-java  { background: #2a1a12; color: #ffb86c; }
    .ext-py    { background: #12223a; color: #6bcfff; }
    .ext-sql   { background: #1e1230; color: #b06bff; }
    .ext-cpp, .ext-c { background: #121a3a; color: #6b8aff; }
    .ext-zip, .ext-rar { background: #2a2a12; color: #ffee6b; }
    .ext-default { background: var(--border); color: var(--muted); }

    /* Download badge */
    .dl-badge {
      font-size: 0.68rem;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 4px;
      transition: color 0.15s;
    }

    .file-card:hover .dl-badge { color: var(--red); }

    /* States */
    .state-box {
      text-align: center;
      padding: 4rem 2rem;
      color: var(--muted);
    }

    .state-box .icon { font-size: 2.5rem; margin-bottom: 1rem; opacity: 0.3; }
    .state-box p { font-size: 0.9rem; }

    /* Loading spinner */
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner {
      width: 28px; height: 28px;
      border: 2px solid var(--border2);
      border-top-color: var(--red);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 0 auto 1rem;
    }

    /* Footer */
    footer {
      text-align: center;
      padding: 2rem 1rem;
      font-size: 0.75rem;
      color: var(--muted);
      border-top: 1px solid var(--border);
      margin-top: 2rem;
    }

    footer a { color: var(--red); text-decoration: none; }

    /* Responsive */
    @media (max-width: 480px) {
      .stat-bar { flex-wrap: wrap; }
      .stat { min-width: 50%; }
      .filter-bar { gap: 6px; }
      .search-box { width: 100%; margin-left: 0; }
    }
  </style>
</head>
<body>

<div class="header-stripe"></div>

<div class="hero">
  <div class="hero-tag">🏎️ ARtiGA · Repositorio de Archivos</div>
  <h1>ARCHIVOS<br><span>SUBIDOS</span></h1>
  <p class="hero-sub">Todos los archivos cargados al repositorio, en tiempo real.</p>
</div>

<div class="stat-bar">
  <div class="stat">
    <span class="stat-label">Total archivos</span>
    <span class="stat-value red" id="stat-total">—</span>
  </div>
  <div class="stat">
    <span class="stat-label">Tipos distintos</span>
    <span class="stat-value" id="stat-types">—</span>
  </div>
  <div class="stat">
    <span class="stat-label">Repositorio</span>
    <span class="stat-value green">artiga101</span>
  </div>
</div>

<main>
  <div class="filter-bar" id="filter-bar">
    <button class="filter-btn active" data-ext="all">Todos</button>
    <input class="search-box" type="text" placeholder="Buscar archivo..." id="search-input"/>
  </div>

  <div class="files-grid" id="files-grid">
    <div class="state-box">
      <div class="spinner"></div>
      <p>Cargando archivos desde GitHub...</p>
    </div>
  </div>
</main>

<footer>
  Datos en tiempo real via GitHub API ·
  <a href="https://github.com/artiga101/artiga101" target="_blank">artiga101/artiga101</a>
</footer>

<script>
  const REPO    = 'artiga101/artiga101';
  const FOLDER  = 'drive-download-20260603T204422Z-3-001';
  const API_URL = `https://api.github.com/repos/${REPO}/contents/${FOLDER}`;

  const ICONS = {
    pdf:'📄', doc:'📝', docx:'📝', ppt:'📊', pptx:'📊',
    xls:'📈', xlsx:'📈', java:'☕', py:'🐍', sql:'🗄️',
    cpp:'⚙️', c:'⚙️', zip:'📦', rar:'📦', txt:'📃',
    png:'🖼️', jpg:'🖼️', jpeg:'🖼️', gif:'🖼️', mp4:'🎬',
    html:'🌐', css:'🎨', js:'📜', md:'📋'
  };

  function getExt(name) {
    return name.split('.').pop().toLowerCase();
  }

  function extClass(ext) {
    const known = ['pdf','docx','doc','pptx','ppt','xlsx','xls','java','py','sql','cpp','c','zip','rar'];
    return known.includes(ext) ? `ext-${ext}` : 'ext-default';
  }

  function formatSize(bytes) {
    if (!bytes) return '—';
    if (bytes < 1024) return bytes + ' B';
    if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
    return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
  }

  function renderCard(file) {
    const ext  = getExt(file.name);
    const icon = ICONS[ext] || '📁';
    const card = document.createElement('a');
    card.className = 'file-card';
    card.href = file.html_url;
    card.target = '_blank';
    card.dataset.ext = ext;
    card.dataset.name = file.name.toLowerCase();
    card.innerHTML = `
      <div class="file-icon">${icon}</div>
      <div class="file-name">${file.name}</div>
      <div class="file-meta">
        <span class="file-ext ${extClass(ext)}">${ext}</span>
        <span class="file-size">${formatSize(file.size)}</span>
      </div>
      <div class="dl-badge">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        Ver en GitHub
      </div>
    `;
    return card;
  }

  function buildFilters(files) {
    const exts = [...new Set(files.map(f => getExt(f.name)))].sort();
    const bar  = document.getElementById('filter-bar');
    const search = document.getElementById('search-input');

    exts.forEach(ext => {
      const btn = document.createElement('button');
      btn.className = 'filter-btn';
      btn.dataset.ext = ext;
      btn.textContent = ext.toUpperCase();
      bar.insertBefore(btn, search);
    });

    bar.addEventListener('click', e => {
      if (!e.target.matches('.filter-btn')) return;
      bar.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      e.target.classList.add('active');
      filterFiles();
    });

    search.addEventListener('input', filterFiles);
  }

  function filterFiles() {
    const activeExt = document.querySelector('.filter-btn.active').dataset.ext;
    const query     = document.getElementById('search-input').value.toLowerCase();
    document.querySelectorAll('.file-card').forEach(card => {
      const matchExt  = activeExt === 'all' || card.dataset.ext === activeExt;
      const matchName = card.dataset.name.includes(query);
      card.style.display = matchExt && matchName ? '' : 'none';
    });
  }

  async function loadFiles() {
    const grid = document.getElementById('files-grid');
    try {
      const res   = await fetch(API_URL);
      const files = await res.json();

      if (!Array.isArray(files) || files.length === 0) {
        grid.innerHTML = `<div class="state-box"><div class="icon">📭</div><p>No se encontraron archivos en la carpeta.</p></div>`;
        return;
      }

      const onlyFiles = files.filter(f => f.type === 'file');

      document.getElementById('stat-total').textContent = onlyFiles.length;
      document.getElementById('stat-types').textContent =
        new Set(onlyFiles.map(f => getExt(f.name))).size;

      buildFilters(onlyFiles);
      grid.innerHTML = '';
      onlyFiles.forEach(f => grid.appendChild(renderCard(f)));

    } catch(err) {
      grid.innerHTML = `<div class="state-box"><div class="icon">⚠️</div><p>Error al cargar. Verifica tu conexión o intenta más tarde.</p></div>`;
    }
  }

  loadFiles();
</script>
</body>
</html>
